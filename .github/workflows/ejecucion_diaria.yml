# =============================================================================
# GitHub Action: Resumen Diario MEFF
# =============================================================================
#
# CUÁNDO EJECUTA:
#   08:00 UTC de lunes a viernes.
#   - Por qué 08:00 UTC: equivale a 09:00 en horario de invierno español
#     (CET, UTC+1) y a 10:00 en horario de verano (CEST, UTC+2). A esa
#     hora el mercado del día anterior ya cerró (~17:35 CET) y el MEFF
#     ha publicado sus estadísticas definitivas de cierre.
#   - Por qué 1-5: el MEFF solo publica datos en días hábiles (lunes a
#     viernes). Los sábados y domingos no hay datos disponibles.
#   - Para cambiar la hora: modifica el campo cron, ej. '0 9 * * 1-5'
#     ejecutaría a las 09:00 UTC. Referencia: https://crontab.guru
#
# EJECUCIÓN MANUAL:
#   Desde la pestaña Actions → Resumen Diario MEFF → Run workflow.
#   Puedes especificar una fecha concreta (YYYY-MM-DD) o dejar vacío
#   para procesar el último día hábil.
#
# SECRETOS REQUERIDOS (Settings → Secrets → Actions):
#   - ANTHROPIC_API_KEY: clave de acceso a la Claude API.
# =============================================================================

name: Resumen Diario MEFF

on:
  schedule:
    # Lun-Vie a las 08:00 UTC
    # (09:00 España invierno / 10:00 España verano)
    - cron: '0 8 * * 1-5'

  workflow_dispatch:
    # Permite ejecución manual desde la pestaña Actions
    inputs:
      fecha:
        description: 'Fecha YYYY-MM-DD (vacío = último día hábil)'
        required: false
        default: ''

jobs:
  resumen-diario:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Necesario para hacer commit y push del resumen generado

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pipeline completa MEFF
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.fecha }}" ]; then
            python -m fuentes.meff.parser ${{ github.event.inputs.fecha }} --analizar
          else
            python -m fuentes.meff.parser --analizar
          fi

      - name: Commit y push del resumen generado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/meff_historico.csv data/anomalias/ resumenes/meff/
          if git diff --staged --quiet; then
            echo "No hay cambios que commitear (¿fin de semana o festivo?)"
          else
            FECHA=$(date -u +"%Y-%m-%d")
            git commit -m "Resumen automático MEFF $FECHA"
            git push
          fi

      - name: Subir logs como artifact (siempre, incluso si falla)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-ejecucion-${{ github.run_id }}
          path: logs/
          retention-days: 30
